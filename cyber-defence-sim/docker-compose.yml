services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cybersim}
      POSTGRES_USER: ${POSTGRES_USER:-cybersim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cybersim_local_only}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.1.4
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "3000:3000"

  api-gateway-service:
    build: { context: ., args: { SERVICE: api-gateway-service } }
    ports: ["8080:8080"]
    environment: &service-env
      SPRING_PROFILES_ACTIVE: local
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
      POSTGRES_DB: ${POSTGRES_DB:-cybersim}
      POSTGRES_USER: ${POSTGRES_USER:-cybersim}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cybersim_local_only}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
      JWT_ISSUER: ${JWT_ISSUER:-cybersim-local}
      JWT_SECRET: ${JWT_SECRET:-local-development-only-change-me}
      SERVICE_AUTH_TOKEN: ${SERVICE_AUTH_TOKEN:-local-service-token}
    depends_on: [postgres, redis, rabbitmq]

  identity-service:
    build: { context: ., args: { SERVICE: identity-service } }
    ports: ["8101:8080"]
    environment: *service-env

  target-registry-service:
    build: { context: ., args: { SERVICE: target-registry-service } }
    ports: ["8102:8080"]
    environment: *service-env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  policy-engine-service:
    build: { context: ., args: { SERVICE: policy-engine-service } }
    ports: ["8103:8080"]
    environment: *service-env

  target-system-service:
    build: { context: ., args: { SERVICE: target-system-service } }
    ports: ["8104:8080"]
    environment: *service-env

  simulation-orchestrator-service:
    build: { context: ., args: { SERVICE: simulation-orchestrator-service } }
    ports: ["8105:8080"]
    environment: *service-env
    depends_on:
      postgres:
        condition: service_healthy

  agent-orchestrator-service:
    build: { context: ., args: { SERVICE: agent-orchestrator-service } }
    ports: ["8106:8080"]
    environment: *service-env

  red-team-agent-service:
    build: { context: ., args: { SERVICE: red-team-agent-service } }
    ports: ["8107:8080"]
    environment: *service-env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      simulation-orchestrator-service:
        condition: service_started
      policy-engine-service:
        condition: service_started
      target-system-service:
        condition: service_started
      vulnerability-registry-service:
        condition: service_started

  blue-team-agent-service:
    build: { context: ., args: { SERVICE: blue-team-agent-service } }
    ports: ["8108:8080"]
    environment: *service-env

  vulnerability-registry-service:
    build: { context: ., args: { SERVICE: vulnerability-registry-service } }
    ports: ["8109:8080"]
    environment: *service-env
    depends_on:
      postgres:
        condition: service_healthy

  detection-engine-service:
    build: { context: ., args: { SERVICE: detection-engine-service } }
    ports: ["8110:8080"]
    environment: *service-env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      simulation-orchestrator-service:
        condition: service_started
      vulnerability-registry-service:
        condition: service_started

  remediation-service:
    build: { context: ., args: { SERVICE: remediation-service } }
    ports: ["8111:8080"]
    environment: *service-env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      target-system-service:
        condition: service_started
      simulation-orchestrator-service:
        condition: service_started
      policy-engine-service:
        condition: service_started
      vulnerability-registry-service:
        condition: service_started
      detection-engine-service:
        condition: service_started

  verification-service:
    build: { context: ., args: { SERVICE: verification-service } }
    ports: ["8112:8080"]
    environment: *service-env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      target-system-service:
        condition: service_started
      remediation-service:
        condition: service_started
      vulnerability-registry-service:
        condition: service_started
      simulation-orchestrator-service:
        condition: service_started

  scoring-service:
    build: { context: ., args: { SERVICE: scoring-service } }
    ports: ["8113:8080"]
    environment: *service-env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      simulation-orchestrator-service:
        condition: service_started
      vulnerability-registry-service:
        condition: service_started
      detection-engine-service:
        condition: service_started
      remediation-service:
        condition: service_started
      verification-service:
        condition: service_started

  event-log-service:
    build: { context: ., args: { SERVICE: event-log-service } }
    ports: ["8114:8080"]
    environment: *service-env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  dashboard-backend-service:
    build: { context: ., args: { SERVICE: dashboard-backend-service } }
    ports: ["8115:8080"]
    environment: *service-env

  notification-service:
    build: { context: ., args: { SERVICE: notification-service } }
    ports: ["8116:8080"]
    environment: *service-env

  reporting-service:
    build: { context: ., args: { SERVICE: reporting-service } }
    ports: ["8117:8080"]
    environment: *service-env

volumes:
  postgres-data:
