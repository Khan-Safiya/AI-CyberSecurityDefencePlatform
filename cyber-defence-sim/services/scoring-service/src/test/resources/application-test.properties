spring.datasource.url=jdbc:h2:mem:scoring;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=scoring
spring.flyway.enabled=true
spring.flyway.default-schema=scoring
spring.flyway.schemas=scoring
spring.flyway.locations=classpath:db/migration
scoring.consumer.enabled=false
