spring.application.name=api-gateway-service
management.endpoints.web.exposure.include=health,info,prometheus
gateway.jwt.issuer=${JWT_ISSUER:cybersim-local}
gateway.jwt.secret=${JWT_SECRET:local-development-only-change-me}
gateway.jwt.previous-secret=${JWT_PREVIOUS_SECRET:}
gateway.routes.identity=${IDENTITY_SERVICE_URL:http://identity-service:8080}
gateway.routes.targets=${TARGET_REGISTRY_SERVICE_URL:http://target-registry-service:8080}
gateway.routes.simulations=${SIMULATION_ORCHESTRATOR_SERVICE_URL:http://simulation-orchestrator-service:8080}
gateway.routes.dashboard=${DASHBOARD_BACKEND_SERVICE_URL:http://dashboard-backend-service:8080}
