spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:cybersim}
spring.datasource.username=${POSTGRES_USER:cybersim}
spring.datasource.password=${POSTGRES_PASSWORD:cybersim_local_only}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=event_log
spring.flyway.enabled=true
spring.flyway.default-schema=event_log
spring.flyway.schemas=event_log
spring.flyway.locations=classpath:db/migration,classpath:db/postgresql
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_DEFAULT_USER:guest}
spring.rabbitmq.password=${RABBITMQ_DEFAULT_PASS:guest}
spring.rabbitmq.listener.simple.default-requeue-rejected=false
event-consumer.enabled=${EVENT_CONSUMER_ENABLED:true}
