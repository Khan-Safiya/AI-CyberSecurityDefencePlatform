spring.datasource.url=jdbc:h2:mem:remediation;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=remediation
spring.flyway.enabled=true
spring.flyway.default-schema=remediation
spring.flyway.schemas=remediation
remediation.target-system-base-url=http://localhost:1
remediation.consumer.enabled=false
