spring.datasource.url=jdbc:h2:mem:red_team;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.default_schema=red_team
spring.flyway.enabled=true
spring.flyway.default-schema=red_team
spring.flyway.schemas=red_team
red-team.consumer.enabled=false
