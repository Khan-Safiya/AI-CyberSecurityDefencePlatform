spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:cybersim}
spring.datasource.username=${POSTGRES_USER:cybersim}
spring.datasource.password=${POSTGRES_PASSWORD:cybersim_local_only}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=verification
spring.flyway.enabled=true
spring.flyway.default-schema=verification
spring.flyway.schemas=verification
verification.remediation-base-url=${REMEDIATION_SERVICE_BASE_URL:http://remediation-service:8080}
verification.vulnerability-base-url=${VULNERABILITY_SERVICE_BASE_URL:http://vulnerability-registry-service:8080}
verification.target-system-base-url=${TARGET_SYSTEM_BASE_URL:http://target-system-service:8080}
verification.simulation-base-url=${SIMULATION_SERVICE_BASE_URL:http://simulation-orchestrator-service:8080}
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_DEFAULT_USER:guest}
spring.rabbitmq.password=${RABBITMQ_DEFAULT_PASS:guest}
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=1000ms
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.retry.max-interval=5000ms
spring.rabbitmq.listener.simple.default-requeue-rejected=false
verification.consumer.enabled=${VERIFICATION_CONSUMER_ENABLED:true}
service-jwt.secret=${SERVICE_JWT_SECRET:local-service-jwt-secret-change-me-now}
service-jwt.issuer=${SERVICE_JWT_ISSUER:cybersim-services-local}
