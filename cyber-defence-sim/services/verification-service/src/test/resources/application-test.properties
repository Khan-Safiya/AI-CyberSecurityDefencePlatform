spring.datasource.url=jdbc:h2:mem:verification;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=verification
spring.flyway.enabled=true
spring.flyway.default-schema=verification
spring.flyway.schemas=verification
verification.remediation-base-url=http://localhost:1
verification.vulnerability-base-url=http://localhost:1
verification.target-system-base-url=http://localhost:1
verification.consumer.enabled=false
