spring.datasource.url=jdbc:h2:mem:detection_engine;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=detection_engine
spring.flyway.enabled=true
spring.flyway.default-schema=detection_engine
spring.flyway.schemas=detection_engine
detection.consumer.enabled=false
