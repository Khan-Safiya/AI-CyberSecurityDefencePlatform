spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:cybersim}
spring.datasource.username=${POSTGRES_USER:cybersim}
spring.datasource.password=${POSTGRES_PASSWORD:cybersim_local_only}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=simulation_orchestrator
spring.flyway.enabled=true
spring.flyway.default-schema=simulation_orchestrator
spring.flyway.schemas=simulation_orchestrator
service-jwt.secret=${SERVICE_JWT_SECRET:local-service-jwt-secret-change-me-now}
service-jwt.issuer=${SERVICE_JWT_ISSUER:cybersim-services-local}
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_DEFAULT_USER:guest}
spring.rabbitmq.password=${RABBITMQ_DEFAULT_PASS:guest}
spring.rabbitmq.publisher-confirm-type=correlated
outbox.publisher.enabled=true
outbox.publisher.delay-ms=1000
security.jwt.issuer=${JWT_ISSUER:cybersim-local}
security.jwt.secret=${JWT_SECRET:local-development-only-change-me}
security.jwt.previous-secret=${JWT_PREVIOUS_SECRET:}
