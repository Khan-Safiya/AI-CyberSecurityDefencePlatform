spring.datasource.url=jdbc:h2:mem:simulation_orchestrator;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=simulation_orchestrator
spring.flyway.enabled=true
spring.flyway.default-schema=simulation_orchestrator
spring.flyway.schemas=simulation_orchestrator
simulation.service-auth-token=test-service-token
outbox.publisher.enabled=false
