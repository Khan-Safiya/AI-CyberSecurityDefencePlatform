spring.datasource.url=jdbc:h2:mem:target_registry;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=target_registry
spring.flyway.enabled=true
spring.flyway.default-schema=target_registry
spring.flyway.schemas=target_registry
