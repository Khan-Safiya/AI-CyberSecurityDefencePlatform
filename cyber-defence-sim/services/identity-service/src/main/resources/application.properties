spring.application.name=identity-service
management.endpoints.web.exposure.include=health,info,prometheus

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:cybersim}
spring.datasource.username=${POSTGRES_USER:cybersim}
spring.datasource.password=${POSTGRES_PASSWORD:cybersim_local_only}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=identity_service
spring.flyway.enabled=true
spring.flyway.default-schema=identity_service
spring.flyway.schemas=identity_service

identity.jwt.issuer=${JWT_ISSUER:cybersim-local}
identity.jwt.secret=${JWT_SECRET:local-development-only-change-me}
identity.jwt.active-key-id=${JWT_ACTIVE_KEY_ID:local-current}
identity.jwt.previous-secret=${JWT_PREVIOUS_SECRET:}
identity.jwt.access-token-lifetime=${JWT_ACCESS_TOKEN_LIFETIME:15m}
identity.users.admin-password=${DEMO_ADMIN_PASSWORD:local-admin-change-me}
identity.users.operator-password=${DEMO_OPERATOR_PASSWORD:local-operator-change-me}
identity.users.auditor-password=${DEMO_AUDITOR_PASSWORD:local-auditor-change-me}
